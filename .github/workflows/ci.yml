name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - run: dotnet build backend/src/Broker.Backoffice.Api/
      - name: Check for vulnerable NuGet packages
        run: dotnet list backend/src/Broker.Backoffice.Api/ package --vulnerable --include-transitive
      - run: dotnet test backend/tests/Broker.Backoffice.Tests.Unit/

  backend-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - run: dotnet test backend/tests/Broker.Backoffice.Tests.Integration/ --verbosity normal

  auth-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('auth-service/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - run: dotnet build auth-service/src/Broker.Auth.Api/
      - name: Check for vulnerable NuGet packages
        run: dotnet list auth-service/src/Broker.Auth.Api/ package --vulnerable --include-transitive
      - run: dotnet test auth-service/tests/Broker.Auth.Tests.Unit/

  auth-service-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('auth-service/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - run: dotnet test auth-service/tests/Broker.Auth.Tests.Integration/ --verbosity normal

  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('gateway/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - run: dotnet build gateway/src/Broker.Gateway.Api/
      - name: Check for vulnerable NuGet packages
        run: dotnet list gateway/src/Broker.Gateway.Api/ package --vulnerable --include-transitive

  permissions-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Permissions.cs sync between monolith and auth-service
        run: |
          diff \
            <(sed '/^namespace /d' backend/src/Broker.Backoffice.Domain/Identity/Permissions.cs) \
            <(sed '/^namespace /d' auth-service/src/Broker.Auth.Domain/Identity/Permissions.cs) \
          || { echo "::error::Permissions.cs is out of sync between backend and auth-service"; exit 1; }

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9.15.4 --activate
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: cd frontend && pnpm install --frozen-lockfile
      - name: Check for vulnerable npm packages
        run: cd frontend && pnpm audit --audit-level=high
      - run: cd frontend && pnpm turbo lint
      - run: cd frontend && pnpm turbo test
      - run: cd frontend && pnpm turbo build
