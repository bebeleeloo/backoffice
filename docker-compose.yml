services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: broker-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?Set SA_PASSWORD in .env}"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: broker-auth
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=BrokerBackoffice;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true"
      Jwt__Secret: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin123!}"
      DEFAULT_DEMO_PASSWORD: "${DEFAULT_DEMO_PASSWORD:-Admin123!}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-false}"
      Cors__Origins__0: "http://localhost:3000"
    ports:
      - "8082:8082"
    depends_on:
      mssql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/8082'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: broker-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=BrokerBackoffice;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true"
      Jwt__Secret: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin123!}"
      DEFAULT_DEMO_PASSWORD: "${DEFAULT_DEMO_PASSWORD:-Admin123!}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-false}"
      AuthService__BaseUrl: "http://auth:8082"
      Cors__Origins__0: "http://localhost:3000"
    ports:
      - "5050:8080"
    depends_on:
      mssql:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: broker-web
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n-db:
    image: postgres:16-alpine
    container_name: broker-n8n-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: "${N8N_DB_PASSWORD:-n8n_password}"
    volumes:
      - n8n-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:latest
    container_name: broker-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: "${N8N_DB_PASSWORD:-n8n_password}"
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: "${N8N_PASSWORD:-Admin123!}"
      WEBHOOK_URL: "http://localhost:5678/"
      GENERIC_TIMEZONE: "Europe/Moscow"
      N8N_SECURE_COOKIE: "false"
      EXECUTIONS_DATA_MAX_AGE: "720"
    ports:
      - "5678:5678"
    depends_on:
      n8n-db:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mssql-data:
  n8n-db-data:
  n8n-data:
