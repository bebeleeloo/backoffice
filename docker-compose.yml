services:
  postgres:
    image: postgres:16-alpine
    container_name: broker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: BrokerBackoffice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${PG_PASSWORD:?Set PG_PASSWORD in .env}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: broker-auth
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=BrokerBackoffice;Username=postgres;Password=${PG_PASSWORD}"
      Jwt__Secret: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin123!}"
      DEFAULT_DEMO_PASSWORD: "${DEFAULT_DEMO_PASSWORD:-Admin123!}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-false}"
      Cors__Origins__0: "http://localhost:3000"
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8082/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: broker-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=BrokerBackoffice;Username=postgres;Password=${PG_PASSWORD}"
      Jwt__Secret: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin123!}"
      DEFAULT_DEMO_PASSWORD: "${DEFAULT_DEMO_PASSWORD:-Admin123!}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-false}"
      AuthService__BaseUrl: "http://auth:8082"
      Cors__Origins__0: "http://localhost:3000"
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: broker-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      Jwt__Secret: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      ConfigDir: "config"
    ports:
      - "8090:8090"
    depends_on:
      api:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8090/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: broker-web
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n-db:
    image: postgres:16-alpine
    container_name: broker-n8n-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: "${N8N_DB_PASSWORD:-n8n_password}"
    volumes:
      - n8n-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:latest
    container_name: broker-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: "${N8N_DB_PASSWORD:-n8n_password}"
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: "${N8N_PASSWORD:-Admin123!}"
      WEBHOOK_URL: "http://localhost:5678/"
      GENERIC_TIMEZONE: "Europe/Moscow"
      N8N_SECURE_COOKIE: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      EXECUTIONS_DATA_MAX_AGE: "720"
      # Broker API connection (available as $env.* in workflow expressions)
      BROKER_API_HOST: "http://gateway:8090"
      BROKER_AUTH_HOST: "http://gateway:8090"
      BROKER_API_URL: "http://gateway:8090/api/v1"
      BROKER_AUTH_URL: "http://gateway:8090/api/v1"
    ports:
      - "5678:5678"
    depends_on:
      n8n-db:
        condition: service_healthy
      gateway:
        condition: service_healthy
    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
  n8n-db-data:
  n8n-data:
